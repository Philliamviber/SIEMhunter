# SIEMhunter v0.1.0 — Docker Compose
# Spec: instructions/08-deployment-hybrid.md
# Security: non-root users, cap_drop: ALL, no-new-privileges, read_only, no Docker socket
# Secrets: Docker secrets only — never in environment blocks

secrets:
  forwarder_cert_push:
    file: ./secrets/forwarder_cert_push.pem
  forwarder_cert_pull:
    file: ./secrets/forwarder_cert_pull.pem
  api_auth_token:
    file: ./secrets/api_auth_token.txt
  clickhouse_password:
    file: ./secrets/clickhouse_password.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

networks:
  ingest:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # no routing to/from host LAN; ClickHouse is internal-only
  egress:
    driver: bridge   # forwarder only; outbound HTTPS to Sentinel

volumes:
  clickhouse_data:
  forwarder_retry_queue:
  # FR #10: persistent store for per-analyst credentials (argon2id hashes).
  # Written by the first-run seed CLI; survives restarts. NOT a Docker secret
  # because the API + seed CLI must write to it (secrets are read-only tmpfs).
  analyst_users:

services:

  # ── Vector: ingest collector ─────────────────────────────────────────────
  # Receives syslog (UDP/TCP/TLS), WEF, and forensic artifact drops.
  # Attaches ProvenanceTag and forwards normalized events to ClickHouse.
  # Port 5140 maps to the in-container unprivileged equivalent of port 514;
  # no CAP_NET_BIND_SERVICE is needed (ports 5140+ are unprivileged).
  # Pin digest after first pull: docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/vectordotdev/vector:0.38.0
  vector:
    image: ghcr.io/vectordotdev/vector:0.38.0
    user: "1000:1000"
    networks:
      - ingest
      - internal
    ports:
      - "5140:5140/udp"    # syslog UDP
      - "5140:5140/tcp"    # syslog TCP
      - "5144:5144/tcp"    # syslog TLS
      - "5985:5985/tcp"    # WEF HTTP Event Collector
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./drop:/var/siemhunter/drop:ro    # forensic artifact drop (read-only bind)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 67108864    # 64 MiB
      - type: tmpfs
        target: /var/lib/vector
        tmpfs:
          size: 134217728   # 128 MiB for Vector buffer
    environment:
      VECTOR_LOG: warn
      FLOOD_THRESHOLD_EPS: "167"    # ~10,000 events/min → 167/sec
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: siemhunter
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── ClickHouse: local columnar hot store ─────────────────────────────────
  # Internal-only: NO published ports. Reachable only from normalization and detection.
  # Pin digest: docker inspect --format='{{index .RepoDigests 0}}' clickhouse/clickhouse-server:24.3
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    user: "101:101"    # clickhouse UID inside the official image
    networks:
      - internal       # internal-only; no egress, no host ports
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      - ./clickhouse/schema.sql:/docker-entrypoint-schema.sql:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/siemhunter.xml:ro
    secrets:
      - clickhouse_password
    environment:
      CLICKHOUSE_DB: siemhunter
      CLICKHOUSE_USER: siemhunter
      CLICKHOUSE_PASSWORD_FILE: /run/secrets/clickhouse_password
      RETENTION_DAYS: "30"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 512
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user siemhunter --password \"$(cat /run/secrets/clickhouse_password)\" --query 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Normalization: OCSF schema normalizer ────────────────────────────────
  normalization:
    build:
      context: ./services/normalization
      dockerfile: Dockerfile
    user: "1000:1000"
    networks:
      - internal
    volumes:
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 67108864
    secrets:
      - clickhouse_password
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: siemhunter
      CLICKHOUSE_USER: siemhunter
      LOG_LEVEL: warn
      RATE_LIMIT_EVENTS_PER_MIN: "10000"
      DECOMP_RATIO_CAP: "20"
      PARSE_TIMEOUT_SECONDS: "5"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 128
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/normalization_alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Detection: batch Sigma + ML engine ───────────────────────────────────
  detection:
    build:
      context: ./services/detection
      dockerfile: Dockerfile
    user: "1000:1000"
    networks:
      - internal
    volumes:
      - ./rules:/app/rules:ro
      - ./config/siemhunter.yaml:/app/config/siemhunter.yaml:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 134217728   # 128 MiB for compiled SQL and ML model
    secrets:
      - clickhouse_password
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: siemhunter
      CLICKHOUSE_USER: siemhunter
      DETECTION_INTERVAL_SECONDS: "900"   # 15 min default; operator can increase to 3600
      SIGMA_PIPELINE: /app/rules/pipelines/clickhouse-asim-ocsf.yaml
      RULES_DIR: /app/rules/local
      LOG_LEVEL: warn
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/detection_alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Forwarder: Sentinel push client ──────────────────────────────────────
  # The ONLY service on the egress network. Sends to Sentinel via Logs Ingestion
  # API and Incidents API. TLS verification is always on; verify=False is prohibited.
  forwarder:
    build:
      context: ./services/forwarder
      dockerfile: Dockerfile
    user: "1000:1000"
    networks:
      - internal
      - egress
    volumes:
      - forwarder_retry_queue:/app/retry_queue    # writable named volume for on-disk queue
      - ./config/siemhunter.yaml:/app/config/siemhunter.yaml:ro
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 67108864
    secrets:
      - forwarder_cert_push
      - forwarder_cert_pull
      - clickhouse_password
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: siemhunter
      CLICKHOUSE_USER: siemhunter
      LOG_LEVEL: warn
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── API: FastAPI control plane ────────────────────────────────────────────
  # Binds 127.0.0.1 ONLY — never 0.0.0.0. Not reachable from host LAN.
  # Every endpoint requires Bearer token auth (hmac.compare_digest).
  # Phase 3: AI summary egress — 2nd service with outbound; flag for security review
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    user: "1000:1000"
    networks:
      - internal
      - egress
    ports:
      - "127.0.0.1:8080:8080"    # localhost-only; never 0.0.0.0
    volumes:
      - ./rules:/app/rules        # writable: API manages rule lifecycle
      - ./config/siemhunter.yaml:/app/config/siemhunter.yaml:ro
      - analyst_users:/app/auth   # FR #10: per-analyst credential store (writable)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 67108864
    secrets:
      - api_auth_token
      - clickhouse_password
      - anthropic_api_key
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: siemhunter
      CLICKHOUSE_USER: siemhunter
      LOG_LEVEL: warn
      # FR #10: per-analyst credential store path (on the analyst_users volume).
      ANALYST_USERS_PATH: /app/auth/analyst_users.json
      # Session cookie MUST stay secure in production. Only flip to "false" for
      # local plain-HTTP development — never in a release artifact (GATE B C2).
      SESSION_COOKIE_SECURE: "true"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    ulimits:
      nofile:
        soft: 1024
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Frontend: React dashboard (nginx static + API proxy) ────────────────────
  # Binds 127.0.0.1:8081 ONLY. Proxies /v1/* to api:8080.
  # VITE_API_BASE_URL is empty string at build time (same-origin /v1/* calls).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: siemhunter/frontend:0.1.0
    restart: unless-stopped
    user: "101:101"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks:
      - internal
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
