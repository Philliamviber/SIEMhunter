title: Kerberoasting Activity Detected
id: windows-ad-001
status: production
description: |
  Detects Kerberos service ticket requests (EID 4769) using RC4 encryption
  (TicketEncryptionType 0x17 or 0x18) for non-machine accounts. RC4 is the
  weak encryption type exploited by Kerberoasting tools (Rubeus, Invoke-Kerberoast,
  Impacket GetUserSPNs) to obtain offline-crackable ticket hashes.

  Legitimate modern AD environments use AES encryption (0x11, 0x12) for service
  tickets. An RC4 request for a non-machine-account service name is a high-confidence
  indicator of Kerberoasting preparation.

  ATT&CK technique: T1558.003 — Steal or Forge Kerberos Tickets: Kerberoasting.

  SCHEMA GAP (v0.1.0): TicketEncryptionType is not yet in the canonical field table
  (04-normalization-and-schema.md §5). Until the normalization layer extracts this
  field and the pipeline is updated, the rule fires on ALL EID 4769 events for
  non-machine accounts, increasing the false positive rate. Track as schema addition
  requirement. Do not promote to full-precision production until TicketEncryptionType
  is added to the pipeline field_mappings.

  Prerequisite: Audit Kerberos Service Ticket Operations (Success) must be enabled
  via GPO on every Domain Controller. Verify with:
    auditpol /get /subcategory:"Kerberos Service Ticket Operations"

  Optimized for: PRECISION (alerting mode). RC4 service ticket requests for
  non-machine accounts have very low legitimate prevalence in modern AD.
author: SIEMhunter detection-engineer
date: 2026-06-19
references:
  - https://attack.mitre.org/techniques/T1558/003/
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
  filter_machine_accounts:
    # Exclude service tickets requested for machine accounts (name ends in '$').
    # Machine account service tickets are expected and generated by legitimate
    # Kerberos infrastructure operations (e.g., CIFS, HOST SPNs on DCs).
    ServiceName|endswith: "$"
  condition: selection and not filter_machine_accounts
fields:
  - TimeGenerated
  - SubjectUserName
  - SubjectDomainName
  - ServiceName
  - TargetUserName
  - IpAddress
falsepositives:
  - Legacy applications that legitimately configure RC4 as the only supported
    encryption type (add the specific service account name to filter_machine_accounts
    after verification; do not remove the ServiceName$ filter).
  - Authorized penetration test or red team activity (tag the source IP in the
    known-pentest IP allowlist; do not suppress the rule globally).
level: high
tags:
  - attack.credential-access
  - attack.t1558.003
custom:
  rule_id: windows-ad-001
  mitre_tag: T1558.003
