name: Dependency hash check (GATE F)

# GATE F (supply chain): no dependency hash may equal the literal `placeholder`
# sentinel. Shipping a major *security* release with placeholder hashes
# contradicts the supply-chain posture. This workflow fails if any Python
# requirements file still carries a `--hash=sha256:placeholder...` pin.
#
# This is intentionally allowed to FAIL today: requirements.txt currently
# contains `placeholder_regenerate_before_deploy` hashes. They must be
# regenerated from a trusted resolver run before the v3.0.0 tag (decision §6.5).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  dependency-hash:
    name: No placeholder dependency hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail on placeholder hashes in Python requirements
        shell: bash
        run: |
          set -euo pipefail
          # Find every requirements*.txt under services/ and scan for the
          # literal `placeholder` string appearing in a --hash pin.
          mapfile -t req_files < <(find services -name 'requirements*.txt' -type f)
          if [ "${#req_files[@]}" -eq 0 ]; then
            echo "No requirements files found — nothing to check."
            exit 0
          fi
          echo "Scanning ${#req_files[@]} requirements file(s) for placeholder hashes..."
          failed=0
          for f in "${req_files[@]}"; do
            if grep -nE -- '--hash=sha256:[^[:space:]]*placeholder' "$f"; then
              echo "::error file=$f::Placeholder dependency hash found in $f"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "GATE F FAILED: regenerate dependency hashes from a trusted"
            echo "resolver run (e.g. pip-compile --generate-hashes) before tagging v3.0.0."
            exit 1
          fi
          echo "GATE F passed: no placeholder hashes found."
