# SIEMhunter nginx — standalone config (not using conf.d includes)
# Serves the React SPA on :8081 and proxies /v1/* to the api container.

# The container runs as USER 101:101 (nginx uid) set in the Dockerfile.
# Omitting 'user' directive here avoids a setuid() conflict — the process
# is already uid 101 at entrypoint; nginx should not attempt to drop to
# another uid from non-root.
worker_processes  auto;

error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Suppress access logs — request paths can leak sensitive query params
    access_log  off;

    server_tokens   off;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression for text assets
    gzip  on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length  1024;
    gzip_vary  on;

    server {
        listen       8081;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # No directory listings
        autoindex  off;

        # Security headers on every response
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "DENY"           always;
        add_header Referrer-Policy         "same-origin"    always;

        # ── Health check endpoint ─────────────────────────────────────────
        # Returns 200 immediately; used by Docker HEALTHCHECK and load balancers.
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API proxy ─────────────────────────────────────────────────────
        # All requests to /v1/* are forwarded to the api container.
        # The 'api' hostname resolves via Docker's internal DNS on the
        # 'internal' network defined in docker-compose.yml.
        # Trailing slash on proxy_pass strips the /v1 prefix so that
        # /v1/metrics reaches api:8080/v1/metrics unchanged.
        location /v1/ {
            proxy_pass         http://api:8080/v1/;
            proxy_http_version 1.1;

            # Remove hop-by-hop headers
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;

            # Do not buffer large responses (e.g. SSE streams)
            proxy_buffering  off;
        }

        # ── SPA fallback ─────────────────────────────────────────────────
        # Any path that doesn't match a real file is served as index.html
        # so that React Router can handle client-side navigation.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Block hidden files (.git, .env, etc.)
        location ~ /\. {
            deny all;
        }
    }
}
